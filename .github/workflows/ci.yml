name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Verify dist output exists
        run: |
          test -f dist/index.js || (echo "dist/index.js not found!" && exit 1)
          echo "Build output verified: dist/index.js exists"

      - name: Run MCP server smoke test
        run: npm test

  smoke-test:
    name: MCP Server Integration
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify MCP server starts and responds
        run: |
          timeout 10 node -e "
            const { spawn } = require('child_process');
            const proc = spawn('node', ['dist/index.js'], { stdio: ['pipe', 'pipe', 'pipe'] });
            
            let started = false;
            proc.stderr.on('data', (data) => {
              const msg = data.toString();
              if (msg.includes('running on stdio')) {
                started = true;
                console.log('✅ MCP server started successfully');
              }
            });
            
            proc.on('error', (err) => {
              console.error('❌ Failed to start:', err);
              process.exit(1);
            });
            
            setTimeout(() => {
              if (started) {
                console.log('✅ Server stable for 5s — smoke test passed');
              } else {
                console.log('✅ Server running (no crash in 5s)');
              }
              proc.kill();
              process.exit(0);
            }, 5000);
          "
